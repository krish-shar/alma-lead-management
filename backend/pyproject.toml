# Tooling config only. Runtime deps live in requirements.txt so the Docker build
# stays a simple `pip install -r requirements.txt` (no build backend needed for an app).

[tool.pytest.ini_options]
testpaths = ["tests"]
addopts = "-q"
filterwarnings = ["ignore::DeprecationWarning"]

[tool.ruff]
line-length = 100
target-version = "py312"

[tool.ruff.lint]
select = ["E", "F", "I", "B", "UP"]
ignore = ["E501"]
